<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0a0c12"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="url(#bg)"/>

  <!-- Glow -->
  <circle cx="200" cy="190" r="130" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Outer hex ring -->
  <polygon points="200,60 310,120 310,240 200,300 90,240 90,120"
    fill="none" stroke="#6366f1" stroke-width="2" opacity="0.3"/>

  <!-- Inner hex -->
  <polygon points="200,95 275,138 275,222 200,265 125,222 125,138"
    fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>

  <!-- Puzzle piece body -->
  <path d="
    M 160 155
    L 160 185
    C 148 185 140 193 140 205
    C 140 217 148 225 160 225
    L 160 245
    L 240 245
    L 240 225
    C 252 225 260 217 260 205
    C 260 193 252 185 240 185
    L 240 155
    L 220 155
    C 220 143 212 135 200 135
    C 188 135 180 143 180 155
    Z
  " fill="#6366f1" opacity="0.9"/>

  <!-- Puzzle shine -->
  <path d="
    M 163 158
    L 163 182
    C 153 184 145 193 145 205
    L 163 205
    C 163 199 168 195 175 195
    L 175 158
    Z
  " fill="#818cf8" opacity="0.35"/>

  <!-- Dot accent top right -->
  <circle cx="268" cy="132" r="6" fill="#6366f1" opacity="0.8"/>
  <circle cx="132" cy="268" r="4" fill="#818cf8" opacity="0.5"/>
  <circle cx="268" cy="268" r="3" fill="#a5b4fc" opacity="0.4"/>

  <!-- Corner marks -->
  <line x1="60" y1="60" x2="80" y2="60" stroke="#6366f1" stroke-width="2" opacity="0.4"/>
  <line x1="60" y1="60" x2="60" y2="80" stroke="#6366f1" stroke-width="2" opacity="0.4"/>
  <line x1="340" y1="60" x2="320" y2="60" stroke="#6366f1" stroke-width="2" opacity="0.4"/>
  <line x1="340" y1="60" x2="340" y2="80" stroke="#6366f1" stroke-width="2" opacity="0.4"/>
  <line x1="60" y1="340" x2="80" y2="340" stroke="#6366f1" stroke-width="2" opacity="0.4"/>
  <line x1="60" y1="340" x2="60" y2="320" stroke="#6366f1" stroke-width="2" opacity="0.4"/>
  <line x1="340" y1="340" x2="320" y2="340" stroke="#6366f1" stroke-width="2" opacity="0.4"/>
  <line x1="340" y1="340" x2="340" y2="320" stroke="#6366f1" stroke-width="2" opacity="0.4"/>

  <!-- H letter mark -->
  <text x="200" y="330" font-family="monospace" font-size="18" font-weight="700"
    fill="#6366f1" opacity="0.6" text-anchor="middle" letter-spacing="8">HADES</text>
</svg>